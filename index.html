<!doctype html>
<html lang="fr">
<head>

  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">

</head>
